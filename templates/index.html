<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workit</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%234f46e5'/><text x='5' y='23' font-family='system-ui' font-size='17' font-weight='700' fill='white'>W</text></svg>">
  <script src="/static/tailwind.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
  <link rel="stylesheet" href="/static/app.css">
  <script>
    /* Apply saved theme before first paint — value injected by Flask, no flash */
    if ('{{ theme }}' === 'dark') {
      document.body.classList.add('dark');
      document.documentElement.classList.add('dark');
    }
  </script>
</head>
<body>

<!-- ═══ TOP BAR ═══════════════════════════════════════════════ -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-30">
  <div class="max-w-6xl mx-auto px-6 h-14 flex items-center gap-8">
    <!-- Brand -->
    <div class="flex items-center gap-2.5 flex-shrink-0">
      <div class="w-7 h-7 rounded-lg flex items-center justify-center text-white text-xs font-bold" style="background:linear-gradient(135deg,#4f46e5,#818cf8)">W</div>
      <span class="font-bold text-slate-900 text-sm tracking-tight">Workit</span>
    </div>

    <!-- Tabs -->
    <nav class="flex items-center gap-6 h-14">
      <div class="tab-item active flex items-center gap-1.5" data-tab="ssh" onclick="switchTab('ssh')">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        SSH
      </div>
      <div class="tab-item flex items-center gap-1.5" data-tab="kube" onclick="switchTab('kube')">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v18M3 12h18M5.636 5.636l12.728 12.728M5.636 18.364L18.364 5.636"/></svg>
        Kubernetes
      </div>
      <div class="tab-item flex items-center gap-1.5" data-tab="accounts" onclick="switchTab('accounts')">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
        Accounts
      </div>
      <div class="tab-item flex items-center gap-1.5" data-tab="docs" onclick="switchTab('docs')">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        Docs
      </div>
    </nav>

    <!-- Right action (context) -->
    <div class="ml-auto flex items-center gap-2" id="header-actions">
      <!-- Font scale -->
      <div class="relative" id="font-scale-wrap">
        <button onclick="toggleFontScaleMenu()" title="글씨 크기"
          class="h-7 px-2 rounded-full text-[11px] font-bold text-slate-400 border border-slate-200 hover:border-slate-400 hover:text-slate-600 transition-all">Aa</button>
        <div id="font-scale-menu" class="hidden absolute right-0 top-9 bg-white border border-slate-200 rounded-xl shadow-lg py-1 z-50" style="min-width:120px">
          <button onclick="setFontScale(0.85)" class="font-scale-opt w-full text-left px-3 py-1.5 text-xs hover:bg-slate-50 transition-colors" data-scale="0.85">작게 (85%)</button>
          <button onclick="setFontScale(1.0)" class="font-scale-opt w-full text-left px-3 py-1.5 text-xs hover:bg-slate-50 transition-colors" data-scale="1.0">보통 (100%)</button>
          <button onclick="setFontScale(1.1)" class="font-scale-opt w-full text-left px-3 py-1.5 text-xs hover:bg-slate-50 transition-colors" data-scale="1.1">크게 (110%)</button>
          <button onclick="setFontScale(1.2)" class="font-scale-opt w-full text-left px-3 py-1.5 text-xs hover:bg-slate-50 transition-colors" data-scale="1.2">더 크게 (120%)</button>
        </div>
      </div>
      <!-- Theme toggle (always visible) -->
      <button id="theme-btn" onclick="toggleTheme()" title="테마 전환"
        class="w-7 h-7 rounded-full flex items-center justify-center text-slate-400 border border-slate-200 hover:border-slate-400 hover:text-slate-600 transition-all">
      </button>
      <!-- SSH actions -->
      <div id="actions-ssh" class="flex items-center gap-2">
        <button onclick="openGuide('ssh')" title="가이드" class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold text-slate-400 border border-slate-200 hover:border-slate-400 hover:text-slate-600 transition-all">?</button>
        <button id="ssh-refresh-btn" onclick="sshRefresh()" title="새로고침" class="w-7 h-7 rounded-full flex items-center justify-center text-slate-400 border border-slate-200 hover:border-slate-400 hover:text-slate-600 transition-all">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        </button>
        <button onclick="sshCancelDrafts()" id="ssh-cancel-btn" title="변경사항 없음" disabled
          class="flex items-center justify-center w-8 h-8 rounded-lg text-slate-300 dark:text-slate-600 border border-slate-200 dark:border-slate-800 opacity-50 cursor-not-allowed transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>
        </button>
        <button onclick="sshApply()" id="ssh-apply-btn" title="변경사항 없음" disabled
          class="flex items-center justify-center w-8 h-8 rounded-lg text-slate-300 dark:text-slate-600 border border-slate-200 dark:border-slate-800 opacity-50 cursor-not-allowed transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V8l-4-4H8z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 20v-6H8v6M16 4v4H8V4"/></svg>
        </button>
        <button onclick="openDrawer()"
          class="flex items-center gap-1.5 px-3.5 py-1.5 rounded-lg text-xs font-semibold text-white transition-all"
          style="background:#4f46e5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
          추가
        </button>
      </div>
      <!-- Kubernetes actions -->
      <div id="actions-kube" class="hidden flex items-center gap-2">
        <button onclick="openGuide('kube')" title="가이드" class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold text-slate-400 border border-slate-200 hover:border-slate-400 hover:text-slate-600 transition-all">?</button>
        <button id="kube-refresh-btn" onclick="kubeRefresh()" title="새로고침" class="w-7 h-7 rounded-full flex items-center justify-center text-slate-400 border border-slate-200 hover:border-slate-400 hover:text-slate-600 transition-all">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        </button>
        <button onclick="kubeCancelDrafts()" id="kube-cancel-btn" title="변경사항 없음" disabled
          class="flex items-center justify-center w-8 h-8 rounded-lg text-slate-300 dark:text-slate-600 border border-slate-200 dark:border-slate-800 opacity-50 cursor-not-allowed transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>
        </button>
        <button onclick="kubeApply()" id="kube-apply-btn" title="변경사항 없음" disabled
          class="flex items-center justify-center w-8 h-8 rounded-lg text-slate-300 dark:text-slate-600 border border-slate-200 dark:border-slate-800 opacity-50 cursor-not-allowed transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V8l-4-4H8z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 20v-6H8v6M16 4v4H8V4"/></svg>
        </button>
        <button onclick="kubeOpenModal()"
          class="flex items-center gap-1.5 px-3.5 py-1.5 rounded-lg text-xs font-semibold text-white transition-all"
          style="background:#0ea5e9">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
          추가
        </button>
      </div>
      <!-- Accounts actions -->
      <div id="actions-accounts" class="hidden flex items-center gap-2">
        <button onclick="openGuide('accounts')" title="가이드" class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold text-slate-400 border border-slate-200 hover:border-slate-400 hover:text-slate-600 transition-all">?</button>
        <button onclick="acctOpenModal(null)"
          class="flex items-center gap-1.5 px-3.5 py-1.5 rounded-lg text-xs font-semibold text-white transition-all"
          style="background:#4f46e5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
          추가
        </button>
      </div>
      <!-- Docs actions -->
      <div id="actions-docs" class="hidden flex items-center gap-2">
        <label for="docs-upload-input" title=".md 파일 업로드"
          class="flex items-center gap-1.5 px-3.5 py-1.5 rounded-lg text-xs font-semibold text-slate-600 border border-slate-200 hover:bg-slate-50 cursor-pointer transition-all">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
          업로드
        </label>
        <input type="file" id="docs-upload-input" accept=".md" class="hidden" onchange="docsHandleUpload(this)">
        <button onclick="docsNew()"
          class="flex items-center gap-1.5 px-3.5 py-1.5 rounded-lg text-xs font-semibold text-white transition-all"
          style="background:#4f46e5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
          새 문서
        </button>
      </div>
    </div>
  </div>
</header>

<!-- ═══ CONTENT ═══════════════════════════════════════════════ -->
<main class="max-w-6xl mx-auto px-6 py-7">

  <!-- ── SSH ────────────────────────────────────────────────── -->

  {% include 'ssh_tab.html' %}
  {% include 'kube_tab.html' %}
  {% include 'accounts_tab.html' %}
  {% include 'docs_tab.html' %}
</main>

{% include 'drawers_modals.html' %}

<!-- Load scripts globally -->
<script src="/static/js/common.js"></script>
<script src="/static/js/ssh.js"></script>
<script src="/static/js/kube.js"></script>
<script src="/static/js/accounts.js"></script>
<script src="/static/js/docs.js"></script>
<script src="/static/js/init.js"></script>
</body>
</html>
